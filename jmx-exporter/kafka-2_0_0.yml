startDelaySeconds: 0
jmxUrl: service:jmx:rmi:///jndi/rmi://kafka:9999/jmxrmi
ssl: false
lowercaseOutputName: true
lowercaseOutputLabelNames: true

rules:
  # Broker topic metrics (Throughput)
  - pattern: 'kafka.server<type=BrokerTopicMetrics, name=(BytesInPerSec|BytesOutPerSec|MessagesInPerSec)><>Count'
    name: 'kafka_server_brokertopicmetrics_${1}_total'
    type: COUNTER

  # Request metrics (Produce/Fetch)
  - pattern: 'kafka.network<type=RequestMetrics, name=RequestsPerSec, request=(.+)><>Count'
    name: 'kafka_network_requestmetrics_requests_total'
    labels:
      request: "$1"
    type: COUNTER

  # Controller + partition health
  - pattern: 'kafka.controller<type=KafkaController, name=ActiveControllerCount><>Value'
    name: 'kafka_controller_kafkacontroller_activecontrollercount'
    type: GAUGE

  - pattern: 'kafka.controller<type=KafkaController, name=OfflinePartitionsCount><>Value'
    name: 'kafka_controller_kafkacontroller_offlinepartitionscount'
    type: GAUGE

  - pattern: 'kafka.server<type=ReplicaManager, name=UnderReplicatedPartitions><>Value'
    name: 'kafka_server_replicamanager_underreplicatedpartitions'
    type: GAUGE

  # Log end offset by topic/partition
  - pattern: 'kafka.log<type=Log, name=LogEndOffset, topic=(.+), partition=(.+)><>Value'
    name: 'kafka_log_logendoffset'
    labels:
      topic: "$1"
      partition: "$2"
    type: GAUGE

